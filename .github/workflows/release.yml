name: Release FlowState

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    # FIX 2: Grant the GITHUB_TOKEN permission to create releases
    permissions:
      contents: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # FIX 1: Use macos-latest (ARM64) for Apple Silicon
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          # FIX 1: Use macos-13 (Intel) for x86_64 to avoid cross-compilation
          - platform: 'macos-13'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Frontend Dependencies
        run: npm install

      - name: Install macOS Dependencies
        # Ensure both mac runners get OpenSSL and libgit2
        if: matrix.platform == 'macos-latest' || matrix.platform == 'macos-13'
        run: brew install openssl libgit2

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'FlowState v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}