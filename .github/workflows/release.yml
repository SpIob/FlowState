name: Release FlowState

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    # FIX 2: Grant the GITHUB_TOKEN permission to create releases
    permissions:
      contents: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (ARM64) - Fast queue, native compilation
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          
          # Windows (x64)
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Frontend Dependencies
        run: npm install

      - name: Install macOS Dependencies
        # Ensure both mac runners get OpenSSL and libgit2
        if: matrix.platform == 'macos-latest' || matrix.platform == 'macos-13'
        run: brew install openssl libgit2

      - name: Debug Secret Injection
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "❌ TAURI_SIGNING_PRIVATE_KEY is EMPTY or MISSING!"
            echo "Please go to Settings -> Secrets and variables -> Actions."
            echo "Ensure there is a 'Repository secret' (NOT Environment secret) named EXACTLY: TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          else
            echo "✅ Secret injected successfully. Length: ${#TAURI_SIGNING_PRIVATE_KEY} characters."
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}  

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'FlowState v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}